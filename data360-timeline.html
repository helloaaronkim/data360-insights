<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Cloud · Customer Journey Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --brand:       #0070d2;
      --brand-dark:  #005fb2;
      --brand-deep:  #014486;
      --brand-light: #eaf5fe;
      --text-1:      #3e3e3c;
      --text-2:      #706e6b;
      --text-3:      #aeaeac;
      --border:      #dddbda;
      --border-lt:   #f0eeee;
      --bg:          #f3f2f2;
      --white:       #ffffff;
      --success:     #04844b;
      --success-bg:  #ecfdf5;
      --warn:        #ffb75d;
      --warn-bg:     #fffbf5;
      --danger:      #c23934;
      --danger-bg:   #fef1f1;
      --shadow-sm:   0 1px 4px rgba(0,0,0,.08);
      --shadow:      0 2px 8px rgba(0,0,0,.10);
      --shadow-md:   0 4px 16px rgba(0,0,0,.12);
      --web-c:       #0070d2; --web-bg:     #eaf5fe;
      --app-c:       #04844b; --app-bg:     #ecfdf5;
      --crm-c:       #e05c2e; --crm-bg:     #fff5f2;
      --email-c:     #7b39d4; --email-bg:   #f5eeff;
      --offline-c:   #8a6f00; --offline-bg: #fffbee;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text-1);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ─── Header ─── */
    .app-bar {
      background: var(--brand-deep); color: #fff;
      height: 52px; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; z-index: 10;
    }
    .app-bar-left { display: flex; align-items: center; gap: 10px; }
    .sf-badge {
      width: 26px; height: 26px; background: #fff; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: var(--brand-deep);
    }
    .app-bar-title { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
    .app-bar-sub { font-size: 12px; opacity: .6; margin-left: 4px; }
    .app-bar-right { font-size: 11px; opacity: .65; display: flex; align-items: center; gap: 16px; }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #4fd07c;
      display: inline-block; margin-right: 4px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(79,208,124,.5); }
      50%      { box-shadow: 0 0 0 4px rgba(79,208,124,0); }
    }

    /* ─── Body layout ─── */
    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 272px; background: var(--white);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-top {
      padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
    }
    .sidebar-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-2); margin-bottom: 10px;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; padding: 7px 10px 7px 30px;
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 13px; font-family: inherit; color: var(--text-1);
      outline: none; transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--brand); }
    .search-icon {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      font-size: 13px; color: var(--text-3); pointer-events: none;
    }
    .seg-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
    .seg-pill {
      padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 500;
      cursor: pointer; border: 1.5px solid transparent; transition: all .15s; user-select: none;
    }
    .seg-pill.all         { background: var(--brand); color: #fff; }
    .seg-pill.high-value  { background: var(--danger-bg); color: var(--danger); border-color: #f8c6c4; }
    .seg-pill.loyal       { background: var(--success-bg); color: var(--success); border-color: #a3e6c3; }
    .seg-pill.at-risk     { background: var(--warn-bg); color: #7d4a00; border-color: #f5c97a; }
    .seg-pill.new         { background: var(--brand-light); color: var(--brand); border-color: #9dd7fb; }
    .seg-pill.regular     { background: #f5f5f5; color: var(--text-2); border-color: var(--border); }
    .seg-pill.active { outline: 2px solid var(--brand); outline-offset: 1px; }

    .cust-list { overflow-y: auto; flex: 1; }
    .cust-item {
      padding: 11px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border-lt);
      display: flex; align-items: center; gap: 11px;
      transition: background .1s; border-left: 3px solid transparent;
    }
    .cust-item:hover { background: var(--bg); }
    .cust-item.active { background: var(--brand-light); border-left-color: var(--brand); }
    .cust-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .cust-details { flex: 1; min-width: 0; }
    .cust-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cust-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
    .seg-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cust-ltv { font-size: 11px; color: var(--text-2); margin-left: auto; white-space: nowrap; }

    /* ─── Main ─── */
    .main { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

    /* ─── Profile card ─── */
    .profile-card {
      background: var(--white); border-radius: 8px; box-shadow: var(--shadow);
      padding: 20px 24px; display: flex; align-items: flex-start; gap: 18px;
    }
    .profile-ava {
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-name {
      font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .seg-badge {
      padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .profile-contacts { display: flex; gap: 18px; margin-top: 7px; flex-wrap: wrap; }
    .contact-item { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 4px; }
    .profile-nba {
      margin-top: 10px; padding: 8px 12px; border-radius: 6px;
      background: #fffbee; border: 1px solid #f5d87a;
      font-size: 12px; color: #6b5200; display: flex; align-items: flex-start; gap: 6px;
    }
    .profile-stats { display: flex; border-left: 1px solid var(--border); margin-left: 8px; padding-left: 4px; }
    .stat-box { padding: 6px 18px; border-right: 1px solid var(--border); text-align: center; }
    .stat-box:last-child { border-right: none; }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--brand); line-height: 1; }
    .stat-lbl { font-size: 11px; color: var(--text-2); margin-top: 4px; }

    /* ─── Sources row ─── */
    .sources-bar {
      background: var(--white); border-radius: 8px; box-shadow: var(--shadow-sm);
      padding: 14px 20px;
    }
    .sources-bar-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-2); margin-bottom: 10px; }
    .src-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .src-tag {
      display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      border-radius: 20px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1.5px solid transparent; transition: all .15s; user-select: none;
    }
    .src-tag.all     { background: var(--brand); color: #fff; }
    .src-tag.web     { background: var(--web-bg);     color: var(--web-c);     border-color: #b3d9f5; }
    .src-tag.app     { background: var(--app-bg);     color: var(--app-c);     border-color: #a3e6c3; }
    .src-tag.crm     { background: var(--crm-bg);     color: var(--crm-c);     border-color: #fcc2b0; }
    .src-tag.email   { background: var(--email-bg);   color: var(--email-c);   border-color: #d0aaff; }
    .src-tag.offline { background: var(--offline-bg); color: var(--offline-c); border-color: #f5d87a; }
    .src-tag:hover { transform: translateY(-1px); }
    .src-tag.active { outline: 2px solid currentColor; outline-offset: 2px; font-weight: 700; }
    .src-cnt {
      background: rgba(0,0,0,.08); padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600;
    }

    /* ─── Timeline ─── */
    .timeline-card {
      background: var(--white); border-radius: 8px; box-shadow: var(--shadow); padding: 20px;
    }
    .tl-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .tl-title { font-size: 14px; font-weight: 600; }
    .tl-cnt { font-size: 12px; color: var(--text-2); }

    .timeline { position: relative; }
    .timeline::before {
      content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 2px; background: var(--border);
    }
    .date-group { margin-bottom: 22px; }
    .date-heading {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px;
      color: var(--text-2); padding-left: 44px; margin-bottom: 12px;
    }
    .tl-event { display: flex; gap: 14px; margin-bottom: 14px; animation: fadeUp .25s ease-out; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .evt-dot {
      width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
      margin-top: 5px; margin-left: 12px; border: 2.5px solid var(--white);
      position: relative; z-index: 1;
    }
    .evt-dot.web     { background: var(--web-c);     box-shadow: 0 0 0 2px var(--web-c); }
    .evt-dot.app     { background: var(--app-c);     box-shadow: 0 0 0 2px var(--app-c); }
    .evt-dot.crm     { background: var(--crm-c);     box-shadow: 0 0 0 2px var(--crm-c); }
    .evt-dot.email   { background: var(--email-c);   box-shadow: 0 0 0 2px var(--email-c); }
    .evt-dot.offline { background: var(--offline-c); box-shadow: 0 0 0 2px var(--offline-c); }
    .evt-card {
      flex: 1; border: 1px solid var(--border); border-radius: 8px;
      padding: 11px 14px; transition: box-shadow .15s;
    }
    .evt-card:hover { box-shadow: var(--shadow); }
    .evt-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .evt-badge {
      padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .badge-web     { background: var(--web-bg);     color: var(--web-c); }
    .badge-app     { background: var(--app-bg);     color: var(--app-c); }
    .badge-crm     { background: var(--crm-bg);     color: var(--crm-c); }
    .badge-email   { background: var(--email-bg);   color: var(--email-c); }
    .badge-offline { background: var(--offline-bg); color: var(--offline-c); }
    .evt-time { font-size: 11px; color: var(--text-3); white-space: nowrap; }
    .evt-title { font-size: 13px; font-weight: 600; margin-top: 6px; }
    .evt-desc { font-size: 12px; color: var(--text-2); margin-top: 3px; line-height: 1.5; }
    .evt-chips { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .evt-chip {
      font-size: 11px; color: var(--text-2); background: var(--bg);
      padding: 2px 8px; border-radius: 10px; display: flex; align-items: center; gap: 3px;
    }
    .sys-tag {
      font-size: 10px; color: var(--text-3); background: var(--bg);
      padding: 1px 7px; border-radius: 3px; margin-top: 6px;
      display: inline-flex; align-items: center; gap: 4px; font-family: 'SF Mono', monospace;
    }

    /* ─── Empty ─── */
    .empty-wrap { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; }
    .empty-icon { font-size: 46px; margin-bottom: 14px; }
    .empty-title { font-size: 16px; font-weight: 600; }
    .empty-desc  { font-size: 13px; color: var(--text-2); margin-top: 6px; }

    /* ─── No selection ─── */
    .no-select {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--text-2); gap: 12px;
    }
    .no-select-icon { font-size: 52px; opacity: .4; }
    .no-select-txt  { font-size: 14px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  </style>
</head>

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let selectedId  = null;
let activeSeg   = 'all';
let activeSrc   = 'all';

/* ════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════ */
function fmtMoney(n) {
  return '₩' + n.toLocaleString('ko-KR');
}
function segColor(seg) {
  return { 'high-value':'#c23934','loyal':'#04844b','at-risk':'#8a5200','new':'#0070d2','regular':'#706e6b' }[seg] || '#706e6b';
}
function srcIcon(src) {
  return { web:'🌐', app:'📱', crm:'💼', email:'📧', offline:'🏪' }[src] || '●';
}
function srcLabel(src) {
  return { web:'Web', app:'앱', crm:'CRM', email:'이메일', offline:'오프라인' }[src] || src;
}

/* group events by YYYY-MM */
function groupByMonth(events) {
  const map = {};
  events.forEach(e => {
    const key = e.date.slice(0, 7);
    if (!map[key]) map[key] = [];
    map[key].push(e);
  });
  return map;
}
function monthLabel(ym) {
  const [y, m] = ym.split('-');
  const months = ['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return `${y}년 ${months[parseInt(m)]}`;
}

/* ════════════════════════════════════════════════
   RENDER LIST
════════════════════════════════════════════════ */
function renderList() {
  const q   = document.getElementById('searchInput').value.trim().toLowerCase();
  const ul  = document.getElementById('custList');
  ul.innerHTML = '';

  const filtered = CUSTOMERS.filter(c => {
    const matchSeg = activeSeg === 'all' || c.segment === activeSeg;
    const matchQ   = !q || c.name.includes(q) || c.email.includes(q);
    return matchSeg && matchQ;
  });

  if (filtered.length === 0) {
    ul.innerHTML = `<div style="padding:24px 16px;text-align:center;color:var(--text-2);font-size:13px;">검색 결과 없음</div>`;
    return;
  }

  filtered.forEach(c => {
    const div = document.createElement('div');
    div.className = 'cust-item' + (c.id === selectedId ? ' active' : '');
    div.onclick = () => selectCustomer(c.id);
    div.innerHTML = `
      <div class="cust-avatar" style="background:${c.color}">${c.initials}</div>
      <div class="cust-details">
        <div class="cust-name">${c.name}</div>
        <div class="cust-meta">
          <span class="seg-dot" style="background:${segColor(c.segment)}"></span>
          ${c.segmentLabel}
        </div>
      </div>
      <div class="cust-ltv">${fmtMoney(c.ltv)}</div>`;
    ul.appendChild(div);
  });
}

/* ════════════════════════════════════════════════
   SEG PILLS
════════════════════════════════════════════════ */
function renderSegPills() {
  const segs = [
    { key:'all',        label:'전체' },
    { key:'high-value', label:'고가치' },
    { key:'loyal',      label:'충성' },
    { key:'at-risk',    label:'이탈위험' },
    { key:'new',        label:'신규' },
    { key:'regular',    label:'일반' }
  ];
  const wrap = document.getElementById('segPills');
  wrap.innerHTML = segs.map(s => `
    <span class="seg-pill ${s.key}${activeSeg===s.key?' active':''}"
          onclick="setSegFilter('${s.key}')">${s.label}</span>`).join('');
}
function setSegFilter(seg) {
  activeSeg = seg;
  renderSegPills();
  renderList();
}

/* ════════════════════════════════════════════════
   SELECT CUSTOMER
════════════════════════════════════════════════ */
function selectCustomer(id) {
  selectedId = id;
  activeSrc  = 'all';
  renderList();
  renderMain();
}

/* ════════════════════════════════════════════════
   RENDER MAIN
════════════════════════════════════════════════ */

  const c = CUSTOMERS.find(x => x.id === selectedId);
  if (!c) return;

  const main = document.getElementById('mainPane');
  const events = activeSrc === 'all' ? c.events : c.events.filter(e => e.source === activeSrc);

  // source counts
  const srcCounts = {};
  c.events.forEach(e => { srcCounts[e.source] = (srcCounts[e.source]||0) + 1; });

  // profile stats
  const daysSince = Math.floor((Date.now() - new Date(c.joinDate)) / 86400000);
  const months    = Math.max(1, Math.round(daysSince / 30));
  const avgMonthly = Math.round(c.ltv / months / 10000) * 10000;

  main.innerHTML = `
    <!-- Profile -->
    <div class="profile-card">
      <div class="profile-ava" style="background:${c.color}">${c.initials}</div>
      <div class="profile-info">
        <div class="profile-name">
          ${c.name}
          <span class="seg-badge" style="background:${segColor(c.segment)}22;color:${segColor(c.segment)}">${c.segmentLabel}</span>
        </div>
        <div class="profile-contacts">
          <span class="contact-item">📧 ${c.email}</span>
          <span class="contact-item">📱 ${c.phone}</span>
          <span class="contact-item">📅 가입 ${c.joinDate}</span>
        </div>
        <div class="profile-nba">
          <span>⚡</span>
          <span><strong>추천 액션 (Einstein NBA):</strong> ${c.nba}</span>
        </div>
      </div>
      <div class="profile-stats">
        <div class="stat-box">
          <div class="stat-val">${c.events.length}</div>
          <div class="stat-lbl">총 이벤트</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${c.sources.length}</div>
          <div class="stat-lbl">연결 소스</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${fmtMoney(c.ltv)}</div>
          <div class="stat-lbl">누적 구매액</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${srcLabel(c.preferredChannel)}</div>
          <div class="stat-lbl">선호 채널</div>
        </div>
      </div>
    </div>

    <!-- Sources -->
    <div class="sources-bar">

    </div>

    <!-- Timeline -->
    <div class="timeline-card">
      <div class="tl-head">
        <span class="tl-title">고객 여정 타임라인</span>

  `;

  renderSrcTags(c, srcCounts);

}

/* ════════════════════════════════════════════════
   SOURCE TAGS
════════════════════════════════════════════════ */
function renderSrcTags(c, srcCounts) {
  const allSrcs = ['web','app','crm','email','offline'];
  const wrap = document.getElementById('srcTags');

  const totalEvents = c.events.length;
  let html = `<span class="src-tag all${activeSrc==='all'?' active':''}" onclick="setSrcFilter('all')">
    🔀 전체 <span class="src-cnt">${totalEvents}</span></span>`;

  allSrcs.forEach(s => {
    if (!c.sources.includes(s)) return;
    const cnt = srcCounts[s] || 0;
    const sysNames = { web:'Adobe Analytics', app:'Mobile SDK', crm:'Salesforce CRM', email:'Marketing Cloud', offline:'POS System' };
    html += `<span class="src-tag ${s}${activeSrc===s?' active':''}" onclick="setSrcFilter('${s}')">
      ${srcIcon(s)} ${srcLabel(s)}
      <span class="src-cnt">${cnt}</span>
    </span>`;
  });

  wrap.innerHTML = html;
}
function setSrcFilter(src) {
  activeSrc = src;
  const c = CUSTOMERS.find(x => x.id === selectedId);
  if (!c) return;
  const srcCounts = {};
  c.events.forEach(e => { srcCounts[e.source] = (srcCounts[e.source]||0) + 1; });
  renderSrcTags(c, srcCounts);
  const events = src === 'all' ? c.events : c.events.filter(e => e.source === src);
  document.querySelector('.tl-cnt').textContent = `${events.length}개 이벤트 표시 중`;
  renderTimeline(events);
}

/* ════════════════════════════════════════════════
   TIMELINE
════════════════════════════════════════════════ */
function renderTimeline(events) {
  const el = document.getElementById('timelineEl');
  if (!events.length) {
    el.innerHTML = `<div class="empty-wrap">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">해당 소스에서 이벤트 없음</div>
      <div class="empty-desc">다른 소스 필터를 선택해 보세요</div>
    </div>`;
    return;
  }

  const grouped = groupByMonth(events);
  const sortedMonths = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  el.innerHTML = sortedMonths.map(ym => {
    const monthEvts = grouped[ym].slice().sort((a,b) => {
      const da = a.date+'T'+a.time, db = b.date+'T'+b.time;
      return db.localeCompare(da);
    });
    const evtHtml = monthEvts.map(e => `
      <div class="tl-event">
        <div class="evt-dot ${e.source}"></div>
        <div class="evt-card">
          <div class="evt-top">
            <span class="evt-badge badge-${e.source}">${srcIcon(e.source)} ${srcLabel(e.source)}</span>
            <span class="evt-time">${e.date} ${e.time}</span>
          </div>
          <div class="evt-title">${e.title}</div>
          <div class="evt-desc">${e.desc}</div>
          ${e.chips?.length ? `<div class="evt-chips">${e.chips.map(ch=>`<span class="evt-chip">${ch}</span>`).join('')}</div>` : ''}
          <div class="sys-tag">🔌 ${e.system}</div>
        </div>
      </div>`).join('');

    return `<div class="date-group">
      <div class="date-heading">${monthLabel(ym)}</div>
      ${evtHtml}
    </div>`;
  }).join('');
}
