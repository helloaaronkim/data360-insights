      --border:#dddbda; --border-lt:#f0eeee; --bg:#f3f2f2; --white:#ffffff;
      --success:#04844b; --success-bg:#ecfdf5;
      --warn:#ffb75d; --warn-bg:#fffbf5;

             display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}

    .sf-badge{width:26px;height:26px;background:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--brand-deep);}

    .app-bar-sub{font-size:12px;opacity:.6;margin-left:4px;}
    .app-bar-right{font-size:11px;opacity:.65;display:flex;align-items:center;gap:16px;}

    .sidebar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-2);margin-bottom:10px;}
    .search-wrap{position:relative;}
    .search-wrap input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-family:inherit;color:var(--text-1);outline:none;transition:border-color .15s;}

    .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-3);pointer-events:none;}
    .seg-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
    .seg-pill{padding:3px 9px;border-radius:12px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;user-select:none;}
    .seg-pill.all{background:var(--brand);color:#fff;}
    .seg-pill.high-value{background:var(--danger-bg);color:var(--danger);border-color:#f8c6c4;}
    .seg-pill.loyal{background:var(--success-bg);color:var(--success);border-color:#a3e6c3;}
    .seg-pill.at-risk{background:var(--warn-bg);color:#7d4a00;border-color:#f5c97a;}
    .seg-pill.new{background:var(--brand-light);color:var(--brand);border-color:#9dd7fb;}
    .seg-pill.regular{background:#f5f5f5;color:var(--text-2);border-color:var(--border);}
    .seg-pill.active{outline:2px solid var(--brand);outline-offset:1px;}
    .cust-list{overflow-y:auto;flex:1;}
    .cust-item{padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border-lt);display:flex;align-items:center;gap:11px;transition:background .1s;border-left:3px solid transparent;}
    .cust-item:hover{background:var(--bg);}
    .cust-item.active{background:var(--brand-light);border-left-color:var(--brand);}
    .cust-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
    .cust-details{flex:1;min-width:0;}
    .cust-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cust-meta{font-size:11px;color:var(--text-2);margin-top:2px;display:flex;align-items:center;gap:5px;}
    .seg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .cust-ltv{font-size:11px;color:var(--text-2);margin-left:auto;white-space:nowrap;}
    .main{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}
    .profile-card{background:var(--white);border-radius:8px;box-shadow:var(--shadow);padding:20px 24px;display:flex;align-items:flex-start;gap:18px;}
    .profile-ava{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0;}

    .profile-name{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .seg-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
    .profile-contacts{display:flex;gap:18px;margin-top:7px;flex-wrap:wrap;}
    .contact-item{font-size:12px;color:var(--text-2);display:flex;align-items:center;gap:4px;}
    .profile-nba{margin-top:10px;padding:8px 12px;border-radius:6px;background:#fffbee;border:1px solid #f5d87a;font-size:12px;color:#6b5200;display:flex;align-items:flex-start;gap:6px;}
    .profile-stats{display:flex;border-left:1px solid var(--border);margin-left:8px;padding-left:4px;}
    .stat-box{padding:6px 18px;border-right:1px solid var(--border);text-align:center;}
    .stat-box:last-child{border-right:none;}
    .stat-val{font-size:20px;font-weight:700;color:var(--brand);line-height:1;}
    .stat-lbl{font-size:11px;color:var(--text-2);margin-top:4px;}
    .sources-bar{background:var(--white);border-radius:8px;box-shadow:var(--shadow-sm);padding:14px 20px;}
    .sources-bar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-2);margin-bottom:10px;}
    .src-tags{display:flex;gap:8px;flex-wrap:wrap;}
    .src-tag{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;user-select:none;}
    .src-tag.all{background:var(--brand);color:#fff;}
    .src-tag.web{background:var(--web-bg);color:var(--web-c);border-color:#b3d9f5;}
    .src-tag.app{background:var(--app-bg);color:var(--app-c);border-color:#a3e6c3;}
    .src-tag.crm{background:var(--crm-bg);color:var(--crm-c);border-color:#fcc2b0;}
    .src-tag.email{background:var(--email-bg);color:var(--email-c);border-color:#d0aaff;}
    .src-tag.offline{background:var(--offline-bg);color:var(--offline-c);border-color:#f5d87a;}
    .src-tag:hover{transform:translateY(-1px);}
    .src-tag.active{outline:2px solid currentColor;outline-offset:2px;font-weight:700;}
    .src-cnt{background:rgba(0,0,0,.08);padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;}
    .timeline-card{background:var(--white);border-radius:8px;box-shadow:var(--shadow);padding:20px;}
    .tl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
    .tl-title{font-size:14px;font-weight:600;}
    .tl-cnt{font-size:12px;color:var(--text-2);}
    .timeline{position:relative;}
    .timeline::before{content:'';position:absolute;left:19px;top:0;bottom:0;width:2px;background:var(--border);}
    .date-group{margin-bottom:22px;}
    .date-heading{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-2);padding-left:44px;margin-bottom:12px;}
    .tl-event{display:flex;gap:14px;margin-bottom:14px;animation:fadeUp .25s ease-out;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .evt-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:5px;margin-left:12px;border:2.5px solid var(--white);position:relative;z-index:1;}

    .evt-dot.app{background:var(--app-c);box-shadow:0 0 0 2px var(--app-c);}
    .evt-dot.crm{background:var(--crm-c);box-shadow:0 0 0 2px var(--crm-c);}
    .evt-dot.email{background:var(--email-c);box-shadow:0 0 0 2px var(--email-c);}
    .evt-dot.offline{background:var(--offline-c);box-shadow:0 0 0 2px var(--offline-c);}

    .badge-app{background:var(--app-bg);color:var(--app-c);}
    .badge-crm{background:var(--crm-bg);color:var(--crm-c);}

    .badge-offline{background:var(--offline-bg);color:var(--offline-c);}

    .evt-title{font-size:13px;font-weight:600;margin-top:6px;}
    .evt-desc{font-size:12px;color:var(--text-2);margin-top:3px;line-height:1.5;}
    .evt-chips{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
    .evt-chip{font-size:11px;color:var(--text-2);background:var(--bg);padding:2px 8px;border-radius:10px;display:flex;align-items:center;gap:3px;}
    .sys-tag{font-size:10px;color:var(--text-3);background:var(--bg);padding:1px 7px;border-radius:3px;margin-top:6px;display:inline-flex;align-items:center;gap:4px;font-family:'SF Mono',monospace;}

    .empty-icon{font-size:46px;margin-bottom:14px;}
    .empty-title{font-size:16px;font-weight:600;}
    .empty-desc{font-size:13px;color:var(--text-2);margin-top:6px;}
    .no-select{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-2);gap:12px;}

    .no-select-txt{font-size:14px;}

    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  </style>
</head>

let selectedId = null;
let activeSeg  = 'all';
let activeSrc  = 'all';

function fmtMoney(n){ return '¥' + n.toLocaleString('ja-JP'); }
function segColor(seg){
  return {'high-value':'#c23934','loyal':'#04844b','at-risk':'#8a5200','new':'#0070d2','regular':'#706e6b'}[seg]||'#706e6b';
}
function srcIcon(src){ return {web:'🌐',app:'📱',crm:'💼',email:'📧',offline:'🏪'}[src]||'●'; }
function srcLabel(src){ return {web:'Web',app:'アプリ',crm:'CRM',email:'メール',offline:'オフライン'}[src]||src; }

function groupByMonth(events){
  const map={};
  events.forEach(e=>{ const k=e.date.slice(0,7); if(!map[k])map[k]=[]; map[k].push(e); });
  return map;
}
function monthLabel(ym){
  const [y,m]=ym.split('-');
  const mo=['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  return `${y}年 ${mo[parseInt(m)]}`;
}

function renderList(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const ul=document.getElementById('custList');
  ul.innerHTML='';
  const filtered=CUSTOMERS.filter(c=>{
    const ms=activeSeg==='all'||c.segment===activeSeg;
    const mq=!q||c.name.includes(q)||c.email.includes(q);
    return ms&&mq;
  });
  if(!filtered.length){
    ul.innerHTML=`<div style="padding:24px 16px;text-align:center;color:var(--text-2);font-size:13px;">検索結果なし</div>`;
    return;
  }
  filtered.forEach(c=>{
    const div=document.createElement('div');
    div.className='cust-item'+(c.id===selectedId?' active':'');
    div.onclick=()=>selectCustomer(c.id);
    div.innerHTML=`
      <div class="cust-avatar" style="background:${c.color}">${c.initials}</div>
      <div class="cust-details">
        <div class="cust-name">${c.name}</div>
        <div class="cust-meta"><span class="seg-dot" style="background:${segColor(c.segment)}"></span>${c.segmentLabel}</div>
      </div>
      <div class="cust-ltv">${fmtMoney(c.ltv)}</div>`;
    ul.appendChild(div);
  });
}

function renderSegPills(){
  const segs=[
    {key:'all',label:'すべて'},{key:'high-value',label:'高価値'},
    {key:'loyal',label:'ロイヤル'},{key:'at-risk',label:'リスク'},
    {key:'new',label:'新規'},{key:'regular',label:'一般'}
  ];
  document.getElementById('segPills').innerHTML=segs.map(s=>
    `<span class="seg-pill ${s.key}${activeSeg===s.key?' active':''}" onclick="setSegFilter('${s.key}')">${s.label}</span>`
  ).join('');
}
function setSegFilter(seg){ activeSeg=seg; renderSegPills(); renderList(); }
function selectCustomer(id){ selectedId=id; activeSrc='all'; renderList(); renderMain(); }

function renderMain(){
  const c=CUSTOMERS.find(x=>x.id===selectedId);
  if(!c)return;
  const main=document.getElementById('mainPane');
  const events=activeSrc==='all'?c.events:c.events.filter(e=>e.source===activeSrc);
  const srcCounts={};
  c.events.forEach(e=>{ srcCounts[e.source]=(srcCounts[e.source]||0)+1; });
  const daysSince=Math.floor((Date.now()-new Date(c.joinDate))/86400000);
  const months=Math.max(1,Math.round(daysSince/30));
  const avgMonthly=Math.round(c.ltv/months/1000)*1000;

  main.innerHTML=`
    <div class="profile-card">
      <div class="profile-ava" style="background:${c.color}">${c.initials}</div>
      <div class="profile-info">
        <div class="profile-name">
          ${c.name}
          <span class="seg-badge" style="background:${segColor(c.segment)}22;color:${segColor(c.segment)}">${c.segmentLabel}</span>
        </div>
        <div class="profile-contacts">
          <span class="contact-item">📧 ${c.email}</span>
          <span class="contact-item">📅 登録日 ${c.joinDate}</span>
        </div>
        <div class="profile-nba">
          <span>⚡</span>
          <span><strong>推奨アクション (Einstein NBA):</strong> ${c.nba}</span>
        </div>
      </div>
      <div class="profile-stats">
        <div class="stat-box"><div class="stat-val">${c.events.length}</div><div class="stat-lbl">総イベント</div></div>
        <div class="stat-box"><div class="stat-val">${c.sources.length}</div><div class="stat-lbl">連携ソース</div></div>
        <div class="stat-box"><div class="stat-val">${fmtMoney(c.ltv)}</div><div class="stat-lbl">累計購入額</div></div>
        <div class="stat-box"><div class="stat-val">${srcLabel(c.preferredChannel)}</div><div class="stat-lbl">優先チャネル</div></div>
      </div>
    </div>
    <div class="sources-bar">
      <div class="sources-bar-label">📡 Data 360 統合ソース — クリックでフィルター</div>
      <div class="src-tags" id="srcTags"></div>
    </div>
    <div class="timeline-card">
      <div class="tl-head">
        <span class="tl-title">カスタマージャーニー タイムライン</span>
        <span class="tl-cnt">${events.length}件のイベント表示中</span>
      </div>
      <div class="timeline" id="timelineEl"></div>
    </div>`;

  renderSrcTags(c,srcCounts);
  renderTimeline(events);
}

function renderSrcTags(c,srcCounts){
  const wrap=document.getElementById('srcTags');
  let html=`<span class="src-tag all${activeSrc==='all'?' active':''}" onclick="setSrcFilter('all')">🔀 すべて <span class="src-cnt">${c.events.length}</span></span>`;
  ['web','app','crm','email','offline'].forEach(s=>{
    if(!c.sources.includes(s))return;
    const cnt=srcCounts[s]||0;
    html+=`<span class="src-tag ${s}${activeSrc===s?' active':''}" onclick="setSrcFilter('${s}')">
      ${srcIcon(s)} ${srcLabel(s)} <span class="src-cnt">${cnt}</span></span>`;
  });
  wrap.innerHTML=html;
}
function setSrcFilter(src){
  activeSrc=src;
  const c=CUSTOMERS.find(x=>x.id===selectedId);
  if(!c)return;
  const srcCounts={};
  c.events.forEach(e=>{ srcCounts[e.source]=(srcCounts[e.source]||0)+1; });
  renderSrcTags(c,srcCounts);
  const events=src==='all'?c.events:c.events.filter(e=>e.source===src);
  document.querySelector('.tl-cnt').textContent=`${events.length}件のイベント表示中`;
  renderTimeline(events);
}

function renderTimeline(events){
  const el=document.getElementById('timelineEl');
  if(!events.length){
    el.innerHTML=`<div class="empty-wrap">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">このソースにイベントがありません</div>
      <div class="empty-desc">別のソースフィルターを選択してください</div>
    </div>`;
    return;
  }
  const grouped=groupByMonth(events);
  const sortedMonths=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=sortedMonths.map(ym=>{
    const mEvts=grouped[ym].slice().sort((a,b)=>{
      const da=a.date+'T'+a.time,db=b.date+'T'+b.time;
      return db.localeCompare(da);
    });
    const evtHtml=mEvts.map(e=>`
      <div class="tl-event">
        <div class="evt-dot ${e.source}"></div>
        <div class="evt-card">
          <div class="evt-top">
            <span class="evt-badge badge-${e.source}">${srcIcon(e.source)} ${srcLabel(e.source)}</span>
            <span class="evt-time">${e.date} ${e.time}</span>
          </div>
          <div class="evt-title">${e.title}</div>
          <div class="evt-desc">${e.desc}</div>
          ${e.chips?.length?`<div class="evt-chips">${e.chips.map(ch=>`<span class="evt-chip">${ch}</span>`).join('')}</div>`:''}
          <div class="sys-tag">🔌 ${e.system}</div>
        </div>
      </div>`).join('');
    return `<div class="date-group"><div class="date-heading">${monthLabel(ym)}</div>${evtHtml}</div>`;
  }).join('');
}

renderList();
selectCustomer(1);
